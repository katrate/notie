name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        os: [windows-latest, macos-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: 1

      - run: npm run build

      - name: Build package
        run: npx electron-builder --config
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Ensure release exists and upload
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          gh release create "$TAG" --title "Notie $TAG" --generate-notes 2>/dev/null || true
          for f in release/*; do
            [ -f "$f" ] && gh release upload "$TAG" "$f" --clobber
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
